<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="The Bogey — a solitaire card game by Katharine Turner. Play cards into columns and beat the bogey!">
  <title>The Bogey</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Desktop: dark background with subtle pattern */
    body {
      background: #0a0a0a;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(26, 71, 42, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(13, 40, 24, 0.15) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      width: 100%;
      height: 100%;
      max-width: 480px;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
      touch-action: manipulation;
    }

    /* Desktop: add frame around the game */
    @media (min-width: 600px) {
      #game-container {
        height: 100%;
        max-height: 100vh;
        border-left: 1px solid rgba(212, 168, 71, 0.2);
        border-right: 1px solid rgba(212, 168, 71, 0.2);
        box-shadow:
          0 0 60px rgba(0, 0, 0, 0.5),
          0 0 120px rgba(26, 71, 42, 0.15);
      }
    }

    /* Mobile: fill everything, no border */
    @media (max-width: 599px) {
      body {
        background: #0d2818;
      }
      #game-container {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
